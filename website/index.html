<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שמחות פלוס — תוכנית עסקית</title>
  <meta name="description" content="תוכנית עסקית מורחבת, ניתוח שוק, מיפוי אולמות ומצגת — שמחות פלוס" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Frank+Ruhl+Libre:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./base.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <a href="#main" class="skip-link">דלג לתוכן</a>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar" aria-label="ניווט ראשי">
    <div class="brand">
      <span class="brand-logo" aria-hidden="true">
        <svg viewBox="0 0 40 40" width="36" height="36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="34" height="34" rx="9" fill="currentColor" opacity="0.12"/>
          <path d="M20 8.5l2.9 5.9 6.5.95-4.7 4.58 1.1 6.47L20 23.36l-5.8 3.05 1.1-6.47-4.7-4.58 6.5-.95L20 8.5z" fill="currentColor"/>
          <circle cx="20" cy="31.5" r="2.1" fill="var(--gold)"/>
        </svg>
      </span>
      <div class="brand-text">
        <strong>שמחות פלוס</strong>
        <small>תוכנית עסקית מורחבת</small>
      </div>
    </div>

    <nav class="nav" id="nav" aria-label="גיליונות"></nav>

    <div class="sidebar-foot">
      <a class="ghub-link" id="ghubLink" href="https://github.com/l023131500-ops/bsmachot-plus" target="_blank" rel="noopener noreferrer">
        מאגר GitHub
      </a>
      <small>גרסה מורחבת · 25/06/2026</small>
    </div>
  </aside>

  <div class="scrim" id="scrim" hidden></div>

  <!-- Main -->
  <div class="shell">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="פתח תפריט" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <h1 class="page-title" id="pageTitle">טוען…</h1>
      <div class="topbar-actions">
        <div class="search-wrap" id="searchWrap" hidden>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input type="search" id="tableSearch" placeholder="חיפוש אולם, עיר, קטגוריה…" aria-label="חיפוש בטבלה" />
        </div>
        <button class="theme-btn" id="themeBtn" aria-label="החלף מצב תצוגה">
          <svg class="ico-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg class="ico-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
        </button>
      </div>
    </header>

    <main class="main" id="main" tabindex="-1">
      <div id="view"></div>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
